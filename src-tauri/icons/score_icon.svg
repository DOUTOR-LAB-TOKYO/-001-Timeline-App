<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2020"/>
      <stop offset="100%" stop-color="#111313"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="#2a2e2e" stroke-width="3"/>

  <!-- Track 1 line (y=310) -->
  <line x1="80" y1="310" x2="944" y2="310" stroke="#2e3232" stroke-width="4"/>
  <!-- Track 2 line (y=512) -->
  <line x1="80" y1="512" x2="944" y2="512" stroke="#2e3232" stroke-width="4"/>
  <!-- Track 3 line (y=714) -->
  <line x1="80" y1="714" x2="944" y2="714" stroke="#2e3232" stroke-width="4"/>

  <!-- ── Track 1 (green) ── -->
  <!-- KF A x=200 -->
  <polygon points="200,310 248,262 296,310 248,358" fill="#4ade80"/>
  <!-- KF B x=530 -->
  <polygon points="530,310 578,262 626,310 578,358" fill="#4ade80" opacity="0.45"/>
  <!-- KF C x=820 -->
  <polygon points="820,310 868,262 916,310 868,358" fill="#4ade80"/>
  <!-- Connecting segments -->
  <line x1="248" y1="310" x2="578" y2="310" stroke="#4ade80" stroke-width="5" opacity="0.4"/>
  <line x1="578" y1="310" x2="868" y2="310" stroke="#4ade80" stroke-width="5" opacity="0.4"/>

  <!-- ── Track 2 (blue) ── -->
  <!-- KF A x=140 -->
  <polygon points="140,512 188,464 236,512 188,560" fill="#60a5fa"/>
  <!-- KF B x=400 -->
  <polygon points="400,512 448,464 496,512 448,560" fill="#60a5fa"/>
  <!-- KF C x=700 -->
  <polygon points="700,512 748,464 796,512 748,560" fill="#60a5fa" opacity="0.45"/>
  <!-- Connecting segments -->
  <line x1="188" y1="512" x2="448" y2="512" stroke="#60a5fa" stroke-width="5" opacity="0.4"/>
  <line x1="448" y1="512" x2="748" y2="512" stroke="#60a5fa" stroke-width="5" opacity="0.4"/>

  <!-- ── Track 3 (amber) ── -->
  <!-- KF A x=310 -->
  <polygon points="310,714 358,666 406,714 358,762" fill="#f59e0b" opacity="0.45"/>
  <!-- KF B x=600 -->
  <polygon points="600,714 648,666 696,714 648,762" fill="#f59e0b"/>
  <!-- KF C x=880 -->
  <polygon points="880,714 928,666 976,714 928,762" fill="#f59e0b"/>
  <!-- Connecting segments -->
  <line x1="358" y1="714" x2="648" y2="714" stroke="#f59e0b" stroke-width="5" opacity="0.4"/>
  <line x1="648" y1="714" x2="928" y2="714" stroke="#f59e0b" stroke-width="5" opacity="0.4"/>

  <!-- ── Playhead ── -->
  <line x1="530" y1="210" x2="530" y2="820" stroke="#4ade80" stroke-width="7" opacity="0.95"/>
  <polygon points="500,218 560,218 530,258" fill="#4ade80" opacity="0.95"/>

</svg>
