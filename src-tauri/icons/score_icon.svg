<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2020"/>
      <stop offset="100%" stop-color="#111313"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="#2a2e2e" stroke-width="2"/>

  <!-- Playhead glow -->
  <rect x="0" y="280" width="1024" height="464" fill="url(#glow)" clip-path="url(#round)"/>

  <!-- Timeline track lines (staff lines) -->
  <!-- Track 1 -->
  <line x1="112" y1="340" x2="912" y2="340" stroke="#2a2e2e" stroke-width="2"/>
  <!-- Track 2 -->
  <line x1="112" y1="512" x2="912" y2="512" stroke="#2a2e2e" stroke-width="2"/>
  <!-- Track 3 -->
  <line x1="112" y1="684" x2="912" y2="684" stroke="#2a2e2e" stroke-width="2"/>

  <!-- Track 1 keyframes (diamonds) -->
  <polygon points="230,340 258,312 286,340 258,368" fill="#4ade80"/>
  <polygon points="430,340 458,312 486,340 458,368" fill="#4ade80" opacity="0.5"/>
  <polygon points="660,340 688,312 716,340 688,368" fill="#4ade80"/>

  <!-- Track 1 connecting line -->
  <line x1="258" y1="340" x2="458" y2="340" stroke="#4ade80" stroke-width="3" opacity="0.35"/>
  <line x1="458" y1="340" x2="688" y2="340" stroke="#4ade80" stroke-width="3" opacity="0.35"/>

  <!-- Track 2 keyframes -->
  <polygon points="310,512 338,484 366,512 338,540" fill="#60a5fa"/>
  <polygon points="530,512 558,484 586,512 558,540" fill="#60a5fa"/>
  <polygon points="770,512 798,484 826,512 798,540" fill="#60a5fa" opacity="0.5"/>

  <!-- Track 2 connecting line -->
  <line x1="338" y1="512" x2="558" y2="512" stroke="#60a5fa" stroke-width="3" opacity="0.35"/>
  <line x1="558" y1="512" x2="798" y2="512" stroke="#60a5fa" stroke-width="3" opacity="0.35"/>

  <!-- Track 3 keyframes -->
  <polygon points="200,684 228,656 256,684 228,712" fill="#f59e0b" opacity="0.5"/>
  <polygon points="490,684 518,656 546,684 518,712" fill="#f59e0b"/>
  <polygon points="740,684 768,656 796,684 768,712" fill="#f59e0b"/>

  <!-- Track 3 connecting line -->
  <line x1="228" y1="684" x2="518" y2="684" stroke="#f59e0b" stroke-width="3" opacity="0.35"/>
  <line x1="518" y1="684" x2="768" y2="684" stroke="#f59e0b" stroke-width="3" opacity="0.35"/>

  <!-- Playhead vertical line -->
  <line x1="530" y1="260" x2="530" y2="764" stroke="#4ade80" stroke-width="5" opacity="0.9"/>
  <!-- Playhead top triangle -->
  <polygon points="510,268 550,268 530,296" fill="#4ade80" opacity="0.9"/>

</svg>
